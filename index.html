<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>INS/MV 3 - Character Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>INS/MV 3</h2>
		<p><i>Release 202604292225</i></p>
        <br>
		<nav>
            <ul>
                <li class="active">Générateur de PNJ</li>
            </ul>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
		<div class="content">

			<h1>Générateur rapide de PNJ</h1>
			
			<!-- En-tête lignes -->
			<div class="npc-form-header">
				<span>Type de PNJ</span>
				<span>Supérieur</span>
				<span>Archétype</span>
				<span>Nombre</span>
				<span></span>
			</div>
			
			<!-- Container lignes -->
			<div id="npc-container"></div>

			<!-- Actions -->
			<div class="actions">
				<button id="add-line">(+) Ajouter un PNJ</button>
			</div>

			<div class="actions">
				<button id="generate">Générer les PNJ !</button>
				<p id="error" class="error"></p>
			</div>
			
			<!-- PNJs générés -->
			<div class="npc-output">
				<div class="npc-results" id="npc-results"></div>
			</div>
			
		</div>
    </main>
</div>

<!-- Template -->
<template id="npc-row-template">
    <div class="npc-row">

        <select class="type">
            <option value="ange">Ange</option>
            <option value="demon">Démon</option>
        </select>

        <select class="superieur">
            <option value="random">Aléatoire</option>
            <option value="baal">Baal</option>
            <option value="belial">Bélial</option>
        </select>

        <select class="archetype">
            <option value="random">Aléatoire</option>
            <option value="optimized">Optimisé</option>
        </select>

        <input type="number" class="nombre" min="1" value="1">

        <button class="delete">✖</button>
    </div>
</template>

<script type="module" src="js/main.js"></script>

</body>
</html>
